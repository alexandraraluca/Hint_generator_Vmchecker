# QLoRA — Mistral 7B Instruct (cluster / A100 friendly).
#
# Hugging Face nu are un checkpoint „Ministral-7B”; familia Ministral e 3B/8B.
# Acest fișier folosește instruct 7B standard (Apache 2.0). Pentru Ministral-8B
# înlocuiește base_model cu: mistralai/Ministral-8B-Instruct-2410
# (poate cere `huggingface-cli login` după licență).
#
# Usage:
#   python -m src.stage4_finetune.train_qlora --config configs/qlora_mistral7b_instruct.yaml
#   python -m src.stage4_finetune.train_qlora --config configs/qlora_mistral7b_instruct.yaml --dry-run
#
# Dacă `sdpa` dă eroare pe stack-ul de pe cluster, pune attn_implementation: eager.

model:
  base_model: mistralai/Mistral-7B-Instruct-v0.3
  load_kind: auto
  use_4bit: true
  # Doar modelele Harmony (ex. gpt-oss) acceptă acest câmp; pentru Mistral e filtrat automat.
  reasoning_effort: low
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  attn_implementation: sdpa

data:
  train_path: data/hints/finetune_train.jsonl
  val_path: data/hints/finetune_val.jsonl
  max_seq_length: 4096
  pack_sequences: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

train:
  output_dir: models/mistral7b_instruct_pa_hints
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  optim: paged_adamw_8bit
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  save_total_limit: 3
  eval_steps: 50
  eval_strategy: steps
  gradient_checkpointing: true
  dataloader_num_workers: 2
  seed: 23
  report_to: none
